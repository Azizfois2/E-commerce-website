<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Maroc PC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800&family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/signup.css">
	<link rel="stylesheet" href="assets/css/light-mode-industrial.css">
</head>
<body>

    <a href="index.html" class="back-link">← Back to Store</a>

    <div class="container login-container">
        <div class="hero-side">
            <img src="signup.png" alt="Gaming setup workspace">
            <div class="hero-overlay">
                <h2>Welcome Back</h2>
                <p>Access your orders, saved builds, and member-exclusive deals.</p>
            </div>
        </div>

        <div class="inscription">
            <form name="login" method="post" action="login.php" novalidate>
                <h3 id="myH3">Sign In</h3>
                <p class="subtitle">Enter your credentials to continue</p>

                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" name="email" id="login-email" class="hh" placeholder="john@example.com" required>
                    <span class="error-msg" id="err-login-email">Please enter a valid email</span>
                </div>

                <div class="form-group">
                    <label for="login-pass">Password</label>
                    <div class="password-wrap">
                        <input type="password" name="pass" id="login-pass" class="hh" placeholder="••••••••" required>
                        <button type="button" class="toggle-pass" id="loginTogglePass" aria-label="Show password">👁</button>
                    </div>
                    <span class="error-msg" id="err-login-pass">Password is required</span>
                </div>

                <div class="form-options">
                    <label class="remember-label">
                        <input type="checkbox" name="remember" id="remember">
                        <span class="check-box"></span>
                        <span class="remember-text">Remember me</span>
                    </label>
                    <a  href="forgot-password.php"  class="forgot-link">Forgot password?</a>
                </div>

                <div class="form-actions">
                    <button type="submit" class="Bou" id="loginBtn">Sign In</button>
                </div>

                <p class="login-link">New here? <a href="signup.php">Create an account</a></p>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="loginToast">
        <i>⚡</i>
        <span id="loginToastMsg">Welcome back!</span>
    </div>

    <script src="assets/js/login.js" defer></script>
</body>
</html>
